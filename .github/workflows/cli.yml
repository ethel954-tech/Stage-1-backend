name: CLI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CLI
        run: |
          cd cli
          pip install -e .
          pip install flake8
      - name: Lint
        run: flake8 cli/insighta --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Check CLI entry point
        run: insighta --help
